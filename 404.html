<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - GrowCommunityBiz</title>
<link rel="stylesheet" href="CSS/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top left,rgba(196,154,108,.14),transparent 35%),linear-gradient(180deg,#fbfaf8,#f3f0eb);padding:24px}
.wrap{width:min(980px,100%);display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center}
.copy{background:rgba(255,255,255,.78);border:1px solid var(--border);border-radius:28px;padding:40px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
.brand{font-family:var(--font-brand);font-weight:800;display:inline-flex;align-items:center;gap:10px;margin-bottom:18px}
.brand::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(196,154,108,.12)}
h1{font-size:clamp(2.8rem,6vw,5rem);margin-bottom:12px}
p{color:var(--muted);line-height:1.8;margin-bottom:26px;max-width:34ch}
.actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;border-radius:14px;text-decoration:none;font-weight:700}
.btn.primary{background:#111;color:#fff;box-shadow:var(--shadow)}
.btn.secondary{background:#fff;border:1px solid var(--border);color:var(--ink)}
.art{position:relative;min-height:420px;display:grid;place-items:center}
.orb{position:absolute;border-radius:50%;filter:blur(0);opacity:.9}
.orb.one{width:220px;height:220px;background:radial-gradient(circle,rgba(196,154,108,.32),transparent 70%);top:8%;right:12%}
.orb.two{width:320px;height:320px;background:radial-gradient(circle,rgba(17,17,17,.08),transparent 70%);bottom:2%;left:8%}
.card404{width:min(320px,90%);aspect-ratio:1;background:#111;color:#fff;border-radius:32px;display:grid;place-items:center;box-shadow:0 30px 70px rgba(17,17,17,.2)}
.card404 span{font-family:var(--font-brand);font-size:5rem;font-weight:800;letter-spacing:-.08em}
@media(max-width:860px){.wrap{grid-template-columns:1fr}.art{min-height:300px}.copy{padding:28px}}
</style>
</head>
<body>
<main class="wrap">
  <section class="copy">
    <div class="brand">GrowCommunityBiz</div>
    <h1>We could not find that page.</h1>
    <p>The page may have been moved, renamed, or the link is broken. Let’s get you back to the community dashboard.</p>
    <div class="actions">
      <a class="btn primary" href="index.html"><i class="fa-solid fa-house"></i> Back Home</a>
      <a class="btn secondary" href="businesses.html"><i class="fa-solid fa-shop"></i> Browse Businesses</a>
    </div>
  </section>
  <section class="art" aria-hidden="true">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="card404"><span>404</span></div>
  </section>
</main>
<script>
if (window.gsap) {
  gsap.from(".copy", { y: 22, opacity: 0, duration: 0.7, ease: "power3.out" });
  gsap.from(".card404", { scale: 0.92, opacity: 0, duration: 0.75, delay: 0.08, ease: "power3.out" });
  gsap.from(".orb", { scale: 0.85, opacity: 0, duration: 0.9, stagger: 0.08, ease: "power2.out" });
}
</script>
</body>
</html>
