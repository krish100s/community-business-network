<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Community Business Network</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f8f7f5;--surface:#fff;--ink:#111;--muted:#6b7280;--border:#e8e8e8;--accent:#c49a6c;--shadow:0 18px 50px rgba(17,17,17,.08);--shadow-hover:0 28px 60px rgba(17,17,17,.12)}
  body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top left, rgba(196,154,108,.14), transparent 35%),linear-gradient(180deg,#fbfaf8,#f3f0eb);padding:24px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink)}
  .shell{width:min(980px,100%);display:grid;grid-template-columns:1fr 1fr;background:rgba(255,255,255,.72);border:1px solid var(--border);border-radius:28px;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
  .aside{padding:56px;background:linear-gradient(135deg,#111,#1e1e1e);color:#fff;position:relative;overflow:hidden}
  .aside::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(196,154,108,.22),transparent 70%)}
  .brand{font-family:'Syne',sans-serif;font-weight:800;margin-bottom:18px;display:inline-flex;align-items:center;gap:10px}
  .brand::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .aside h1{font-family:'Instrument Serif',serif;font-size:clamp(2.4rem,5vw,4rem);line-height:.98;margin-bottom:14px;max-width:8ch}
  .aside p{max-width:30ch;color:rgba(255,255,255,.72);line-height:1.8}
  .panel{padding:56px}
  .panel h2{font-family:'Instrument Serif',serif;font-size:2.2rem;margin-bottom:8px}
  .panel .small{color:var(--muted);margin-bottom:24px}
  .grid{display:grid;gap:14px}
  .field{display:grid;gap:6px}
  label{font-size:.82rem;font-weight:800;color:var(--ink)}
  input{padding:14px 15px;border-radius:16px;border:1px solid var(--border);background:#fff;box-shadow:0 10px 28px rgba(17,17,17,.03);font:inherit;outline:none;transition:border-color .18s ease,box-shadow .18s ease}
  input:focus{border-color:rgba(196,154,108,.45);box-shadow:0 0 0 4px rgba(196,154,108,.12)}
  button{border:0;background:#111;color:#fff;padding:14px 16px;border-radius:16px;font-size:.95rem;font-weight:800;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}button:hover{transform:translateY(-1px);box-shadow:var(--shadow-hover)}
  .message{margin-top:14px;min-height:22px;font-size:14px;line-height:1.6}
  .success{color:#166534}.error{color:#991b1b}
  .links{margin-top:18px;text-align:center}.links a{color:var(--ink);text-decoration:none;font-weight:800}
  .note{margin-top:10px;font-size:13px;color:var(--muted);line-height:1.6}
  @media(max-width:900px){.shell{grid-template-columns:1fr}.aside,.panel{padding:36px}}
</style>
</head>
<body>
  <div class="shell">
    <div class="aside">
      <div class="brand">Community.Business</div>
      <h1>Reset your password.</h1>
      <p>We’ll send a secure reset link to your registered email address so you can get back into your account safely.</p>
    </div>
    <div class="panel">
      <h2>Reset Password</h2>
      <p class="small">Enter your registered email address and we'll send you a password reset link.</p>
      <div class="grid">
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your registered email">
        </div>
        <button type="button" onclick="sendResetLink()">Send Reset Link</button>
      </div>
      <div id="message" class="message"></div>
      <div class="links"><a href="login.html">Back to Login</a></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script>
    function setMessage(text, type){
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = `message ${type || ""}`.trim();
    }
    function sendResetLink(){
      const email = document.getElementById("email").value.trim();
      if(!email){ setMessage("Please enter your email address.","error"); return; }
      auth.sendPasswordResetEmail(email)
        .then(() => { setMessage("Password reset link sent successfully. Please check your inbox and spam folder.","success"); })
        .catch((error) => { setMessage(error.message,"error"); });
    }
  </script>
</body>
</html>
