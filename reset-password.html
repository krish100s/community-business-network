<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body{
      min-height:100vh;background:#0f172a;display:flex;justify-content:center;align-items:center;
      overflow:hidden;padding:24px;
    }
    .background{
      position:absolute;inset:0;
      background:
        radial-gradient(circle at top left,#7c3aed,transparent 30%),
        radial-gradient(circle at bottom right,#4f46e5,transparent 30%);
      filter:blur(40px);opacity:0.8;
    }
    .card{
      position:relative;width:min(560px,100%);
      background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);
      border-radius:28px;backdrop-filter:blur(20px);padding:40px 32px;color:#fff;
      box-shadow:0 15px 50px rgba(0,0,0,0.3);
    }
    h1{font-size:32px;margin-bottom:10px;}
    p{color:#d1d5db;line-height:1.7;margin-bottom:18px;}
    .step{display:none;margin-top:8px;}
    .step.active{display:block;}
    .grid{display:grid;gap:14px;}
    .input-box{margin-bottom:2px;}
    input{
      width:100%;padding:16px;border:none;background:#f3f4f6;border-radius:14px;
      font-size:16px;outline:none;
    }
    input:focus{background:#fff;border:2px solid #4f46e5;}
    button{
      width:100%;padding:16px;border:none;border-radius:14px;background:#4f46e5;
      color:#fff;font-size:16px;font-weight:bold;cursor:pointer;transition:0.3s;margin-top:4px;
    }
    button:hover{background:#372fcf;transform:translateY(-2px);}
    .message{margin-top:14px;min-height:22px;font-size:14px;line-height:1.6;}
    .success{color:#bbf7d0;}
    .error{color:#fecaca;}
    .links{margin-top:18px;text-align:center;}
    .links a{color:#fff;text-decoration:none;font-weight:bold;}
    .note{margin-top:10px;font-size:13px;color:#d1d5db;line-height:1.6;}
    @media(max-width:720px){.card{padding:30px 20px;}}
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="card">
    <h1>Reset Password</h1>
    <p>
Enter your registered email address and we'll send you a password reset link.
</p>

   <div class="grid">

  <div class="input-box">
    <input
      type="email"
      id="email"
      placeholder="Enter your registered email"
    >
  </div>

  <button
    type="button"
    onclick="sendResetLink()"
  >
    Send Reset Link
  </button>

</div>

<div id="message" class="message"></div>
    <div class="links"><a href="login.html">Back to Login</a></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script>
    
    function setMessage(text, type){

    const el =
    document.getElementById("message");

    el.textContent = text;

    el.className =
    `message ${type || ""}`.trim();

}

function sendResetLink(){

    const email =
    document.getElementById("email")
    .value
    .trim();

    if(!email){

        setMessage(
            "Please enter your email address.",
            "error"
        );

        return;
    }

    auth.sendPasswordResetEmail(email)

    .then(() => {

        setMessage(
            "Password reset link sent successfully. Please check your inbox and spam folder.",
            "success"
        );

    })

    .catch((error) => {

        setMessage(
            error.message,
            "error"
        );

    });

}
  </script>
</body>
</html>
