<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - GrowCommunityBiz</title>
<link rel="stylesheet" href="CSS/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    min-height:100vh;
    display:grid;
    place-items:center;
    background:radial-gradient(circle at top left, rgba(196,154,108,.14), transparent 35%), linear-gradient(180deg,#fbfaf8,#f3f0eb);
    padding:24px;
    color:#111;
    font-family:'Inter',sans-serif;
  }
  .auth-shell{
    width:min(980px,100%);
    background:rgba(255,255,255,.72);
    border:1px solid var(--border);
    border-radius:28px;
    overflow:hidden;
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);
    display:grid;
    grid-template-columns:1fr;
  }
  .auth-panel{padding:56px}
  .brand{
    font-family:'Syne',sans-serif;
    font-weight:800;
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .brand::before{
    content:"";
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--accent);
  }
  .card{
    max-width:560px;
    margin:0 auto;
    display:grid;
    gap:18px;
    justify-items:start;
  }
  .success-mark{
    width:58px;
    height:58px;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(34,197,94,.12);
    color:#16a34a;
    font-size:1.2rem;
  }
  h1{
    font-family:'Manrope',sans-serif;
    font-size:clamp(2rem,4vw,3rem);
    line-height:1.08;
    margin:0;
    font-weight:700;
  }
  p{
    margin:0;
    color:var(--muted);
    line-height:1.8;
    font-size:1rem;
  }
  .countdown{
    padding:12px 14px;
    border-radius:14px;
    background:rgba(17,17,17,.04);
    color:var(--ink);
    font-size:.92rem;
    font-weight:700;
  }
  .btn-row{display:flex;gap:12px;flex-wrap:wrap}
  .btn{
    min-height:58px;
    padding:0 18px;
    border-radius:16px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-weight:800;
    border:0;
    transition:transform .18s ease,box-shadow .18s ease,background .18s ease;
  }
  .btn-primary{
    background:#111;
    color:#fff;
    box-shadow:var(--shadow);
  }
  .btn-secondary{
    background:#fff;
    color:var(--ink);
    border:1px solid var(--border);
    box-shadow:0 10px 28px rgba(17,17,17,.03);
  }
  .btn:hover{transform:translateY(-1px)}
  .hidden{display:none !important}
  .spinner{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff;
    display:none;
    animation:spin .8s linear infinite;
  }
  .btn.loading .spinner{display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){
    body{padding:16px}
    .auth-panel{padding:32px}
    .btn-row{flex-direction:column}
    .btn{width:100%}
  }
</style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-panel">
      <div class="card">
        <a class="brand" href="index.html" aria-label="GrowCommunityBiz home">GrowCommunityBiz</a>
        <div class="success-mark" aria-hidden="true"><i class="fas fa-circle-check"></i></div>
        <h1>Password Updated Successfully</h1>
        <p>Your password has been changed successfully.</p>
        <p>You can now log in using your new password.</p>
        <div id="countdown" class="countdown">Redirecting to Login in 3 seconds...</div>
        <div class="btn-row">
          <a class="btn btn-primary" href="login.html">Back to Login</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    const LOGIN_REDIRECT_URL = "https://growcommunitybiz.vercel.app/login.html";
    let seconds = 3;
    const countdown = document.getElementById("countdown");
    const tick = setInterval(() => {
      seconds -= 1;
      if (seconds <= 0) {
        clearInterval(tick);
        window.location.href = LOGIN_REDIRECT_URL;
        return;
      }
      countdown.textContent = `Redirecting to Login in ${seconds} seconds...`;
    }, 1000);
  </script>
</body>
</html>
