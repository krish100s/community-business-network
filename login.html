<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .background{
      position:absolute;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left,#7c3aed,transparent 30%),
      radial-gradient(circle at bottom right,#4f46e5,transparent 30%);
      filter:blur(40px);
      opacity:0.8;
    }

    .login-container{
      position:relative;
      width:900px;
      height:550px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:30px;
      backdrop-filter:blur(20px);
      display:grid;
      grid-template-columns:1fr 1fr;
      overflow:hidden;
      box-shadow:0 15px 50px rgba(0,0,0,0.3);
    }

    .left{
      padding:70px;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .left h1{
      font-size:60px;
      line-height:1.1;
      margin-bottom:25px;
    }

    .left p{
      color:#d1d5db;
      line-height:1.8;
      font-size:17px;
    }

    .right{
      background:white;
      padding:70px 50px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .form-box{
      width:100%;
      max-width:350px;
    }

    .form-box h2{
      font-size:38px;
      margin-bottom:10px;
      color:#111827;
    }

    .form-box .small{
      color:#6b7280;
      margin-bottom:35px;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input{
      width:100%;
      padding:16px;
      border:none;
      background:#f3f4f6;
      border-radius:14px;
      font-size:16px;
      outline:none;
      transition:0.3s;
    }

    .input-box input:focus{
      background:white;
      border:2px solid #4f46e5;
    }

    .login-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#4f46e5;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    .login-btn:hover{
      background:#372fcf;
      transform:translateY(-3px);
    }

    .bottom{
      text-align:center;
      margin-top:25px;
      color:#6b7280;
    }

    .bottom a{
      color:#4f46e5;
      text-decoration:none;
      font-weight:bold;
    }

    .forgot-link{
      display:inline-block;
      margin-top:10px;
      color:#6b7280;
      text-decoration:none;
      font-size:14px;
    }

    .forgot-link:hover{
      color:#4f46e5;
    }

    @media(max-width:900px){

      .login-container{
        width:95%;
        height:auto;
        grid-template-columns:1fr;
      }

      .left{
        padding:50px 35px;
        text-align:center;
      }

      .left h1{
        font-size:42px;
      }

      .right{
        padding:50px 30px;
      }

    }

  </style>

</head>

<body>

  <div class="background"></div>

  <div class="login-container">

    <div class="left">

      <h1>
        Community Business Network
      </h1>

      <p>
        Empowering local businesses through digital visibility,
        networking, and community support.
      </p>

    </div>

    <div class="right">

      <div class="form-box">

        <h2>Login</h2>

        <p class="small">
          Access your business dashboard
        </p>

        <div class="input-box">
          <input type="email" id="email" placeholder="Email Address">
        </div>

        <div class="input-box">
          <input type="password" id="password" placeholder="Password">
        </div>

        <button
  type="button"
  class="login-btn"
  onclick="loginUser()"
>
  Login
</button>

        <div class="bottom">

          <a href="reset-password.html" class="forgot-link">
            Forgot password?
          </a>

          <br>

          Don't have an account?

          <a href="signup.html">
            Signup
          </a>

        </div>

      </div>

    </div>

  </div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script>

function loginUser(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    if(email === "" || password === ""){
        alert("Please enter email and password");
        return;
    }

    auth.signInWithEmailAndPassword(
        email,
        password
    )

    .then(() => {

    

    window.location.href = "index.html";

})

    .catch((error) => {

    alert(error.message);

});

}

</script>
</body>
</html>
