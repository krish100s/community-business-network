<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Community Business Network</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top left, rgba(196,154,108,.14), transparent 35%), linear-gradient(180deg,#fbfaf8,#f3f0eb);padding:24px;}
.auth-shell{width:min(1080px,100%);display:grid;grid-template-columns:1.05fr .95fr;background:rgba(255,255,255,.72);border:1px solid var(--border);border-radius:28px;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(18px);}
.auth-aside{padding:56px;background:linear-gradient(135deg,#111,#1e1e1e);color:#fff;position:relative;overflow:hidden;}
.auth-aside::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(196,154,108,.22),transparent 70%);}
.auth-aside .brand{font-family:'Syne',sans-serif;font-weight:800;margin-bottom:18px;display:inline-flex;align-items:center;gap:10px;}
.auth-aside .brand::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--accent);}
.auth-aside h1{font-family:'Instrument Serif',serif;font-size:clamp(2.5rem,5vw,4.2rem);line-height:.98;margin-bottom:14px;max-width:8ch;}
.auth-aside p{max-width:30ch;color:rgba(255,255,255,.72);line-height:1.8}
.auth-panel{padding:56px;}
.auth-panel h2{font-family:'Instrument Serif',serif;font-size:2.2rem;margin-bottom:8px;}
.auth-panel .small{color:var(--muted);margin-bottom:28px;}
.auth-grid{display:grid;gap:14px}
.auth-grid label{font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:4px;display:block}
.auth-grid .field{display:grid;gap:6px}
.auth-grid input{padding:14px 15px;border-radius:16px;border:1px solid var(--border);background:#fff;box-shadow:0 10px 28px rgba(17,17,17,.03)}
.bottom{margin-top:18px;text-align:center;color:var(--muted);font-size:.92rem}
.bottom a{color:var(--ink);font-weight:700}
@media(max-width:900px){.auth-shell{grid-template-columns:1fr}.auth-aside{padding:36px}.auth-panel{padding:36px}}
</style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-aside">
    <div class="brand">Community.Business</div>
    <h1>Welcome back.</h1>
    <p>Sign in to manage your business profile, posts, and community presence from one premium dashboard.</p>
  </div>
  <div class="auth-panel">
    <h2>Login</h2>
    <p class="small">Access your business dashboard</p>
    <div class="auth-grid">
      <div class="field"><label for="email">Email Address</label><input type="email" id="email" placeholder="you@example.com"></div>
      <div class="field"><label for="password">Password</label><input type="password" id="password" placeholder="••••••••"></div>
      <button type="button" onclick="loginUser()">Login</button>
    </div>
    <div class="bottom">
      <a href="reset-password.html">Forgot password?</a><br><br>
      Don't have an account? <a href="signup.html">Signup</a>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
function loginUser(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  if(email === "" || password === ""){ alert("Please enter email and password"); return; }
  auth.signInWithEmailAndPassword(email,password).then(() => { window.location.href = "index.html"; }).catch((error) => { alert(error.message); });
}
</script>
</body>
</html>
